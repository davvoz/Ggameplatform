<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#10131f">
<title>CUR8 Racing</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
  <div id="ui"></div>
</div>

<!-- Platform SDK: classic global, must load before the module graph. -->
<script src="../../sdk/platformsdk.obf.js"></script>

<!-- Three.js via CDN import map (the engine is not vendored in this repo). -->
<script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js" integrity="sha384-/LpMD7oBVkFrIiKkLLOgyRFSJmFIFXBFkFpM7qFg3QFi2GiajdRjFPP1xXRiLlb" crossorigin="anonymous"></script>
<script type="importmap-shim">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module-shim" src="js/main.js"></script>
</body>
</html>
