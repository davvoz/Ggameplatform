<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- iOS PWA / fullscreen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sky Tower - Build to the Sky</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Sky Tower...</div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.umd.js"></script>
    <script src="/sdk/platformsdk.obf.js"></script>
    <!-- Fullscreen Button -->
    <button id="fullscreen-btn" title="Fullscreen" aria-label="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
    </button>
    
    <div id="gameContainer">
        <div id="scoreDisplay">
            <div class="main-score" id="scoreValue">0</div>
        </div>

        

        <div id="comboIndicator">
            COMBO: <span id="comboValue">0</span>x
        </div>

        <div id="instruction">
            Click, Tap or press SPACEBAR to stack
        </div>

        <div id="startInstructions">
            TAP TO START
        </div>

        <div id="gameStats">
            <h2>Tower Complete!</h2>
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-label">Height</div>
                    <div class="stat-value" id="finalScore">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Perfect</div>
                    <div class="stat-value" id="finalPerfect">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Combo</div>
                    <div class="stat-value" id="finalCombo">0</div>
                </div>
            </div>
        </div>

        <div id="restartPrompt">
            TAP TO RESTART
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="game.obf.js"></script>
</body>
</html>
