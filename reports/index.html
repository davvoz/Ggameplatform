<!DOCTYPE html><html lang="it"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quality Chronicle — Brutalist</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFBE6;--white:#ffffff;--black:#000000;
  --yellow:#FFE400;--red:#FF3333;--green:#00C853;--purple:#7B2FFF;
  --sh:5px 5px 0 #000;--sh-sm:3px 3px 0 #000;--bd:2.5px solid #000;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:#000;font-size:15px;line-height:1.5;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.page{max-width:1200px;margin:0 auto;padding:0 32px 80px;position:relative;z-index:1}

/* ── HEADER ─────────────────────────────── */
header{border-top:6px solid #000;border-bottom:3px solid #000;padding:36px 0 28px;margin-bottom:36px}
.pid{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.pid::before{content:'▶';color:var(--yellow);background:#000;padding:2px 6px;font-size:10px}
h1{font-size:clamp(52px,9vw,110px);font-weight:700;letter-spacing:-.04em;line-height:.95;text-transform:uppercase;margin-bottom:18px}
h1 .acc{display:inline;background:var(--yellow);padding:0 10px;border-bottom:4px solid #000}
.hmeta{font-family:var(--mono);font-size:12px;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:22px}
.stats-bar{display:flex;gap:10px;flex-wrap:wrap}
.stat-pill{background:#fff;border:var(--bd);box-shadow:var(--sh-sm);padding:8px 16px;font-family:var(--mono);font-size:12px;letter-spacing:.03em}
.stat-pill b{font-weight:700}

/* ── SECTION LABEL ────────────────────── */
.st{display:inline-flex;align-items:center;gap:10px;background:#000;color:var(--yellow);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:9px 16px;margin-bottom:20px}

/* ── TIMELINE ───────────────────────── */
.timeline{display:flex;flex-direction:column;gap:12px}
.edition-card{
  background:#fff;border:var(--bd);box-shadow:var(--sh);
  padding:20px 24px;text-decoration:none;color:#000;
  display:grid;grid-template-columns:100px 1fr auto;gap:0 24px;
  align-items:center;transition:transform .1s,box-shadow .1s;
}
.edition-card:hover{transform:translate(2px,2px);box-shadow:3px 3px 0 #000}
.edition-card:active{transform:translate(5px,5px);box-shadow:0 0 0 #000}
.edition-card.is-feature{box-shadow:5px 5px 0 var(--purple)}
.edition-card.is-special{border-left:6px solid var(--yellow)}

/* number column */
.ed-num{font-family:var(--mono);font-weight:700;font-size:42px;line-height:1;text-align:center;border-right:var(--bd);padding-right:24px}
.ed-num small{display:block;font-size:10px;font-weight:400;color:#777;margin-top:5px;letter-spacing:.04em}

/* body */
.ed-body h3{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.35}
.ed-body .date{font-size:11px;color:#666;font-family:var(--mono);margin-bottom:8px;letter-spacing:.02em}
.ed-body .metrics{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#666;font-family:var(--mono)}
.ed-body .metrics span b{font-weight:700;color:#000}

/* deltas */
.delta-pos{color:#007A33!important;font-weight:700!important}
.delta-neg{color:#CC0000!important;font-weight:700!important}
.delta-zero{color:#999!important}

/* badge */
.qg-col{text-align:right;padding-left:16px}
.badge{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 12px;letter-spacing:.1em;white-space:nowrap;border:var(--bd);box-shadow:var(--sh-sm);text-transform:uppercase}
.bg2{background:var(--green);color:#000}
.br2{background:var(--red);color:#fff}

/* tags */
.latest-tag{display:inline-block;background:var(--yellow);color:#000;font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 7px;border:2px solid #000;margin-left:8px;vertical-align:middle;letter-spacing:.1em;text-transform:uppercase}
.type-tag{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border:2px solid #000;margin-left:6px;vertical-align:middle;text-transform:uppercase}
.tag-feature{background:var(--purple);color:#fff}
.tag-special{background:#000;color:var(--yellow)}

/* ── FOOTER ─────────────────────────── */
footer{margin-top:48px;padding:18px 0 0;border-top:3px solid #000;font-family:var(--mono);font-size:11px;color:#666;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
footer b{color:#000}

/* ── RESPONSIVE ────────────────────── */
@media(max-width:720px){
  .edition-card{grid-template-columns:1fr;gap:12px}
  .ed-num{text-align:left;font-size:30px;border-right:none;border-bottom:var(--bd);padding-right:0;padding-bottom:12px}
  .qg-col{text-align:left;padding-left:0}
  .page{padding:0 16px 60px}
  h1{font-size:52px}
}
</style></head><body><div class="page">
<header>
  <div class="pid">GGAMEPLATFORM &middot; SONARCLOUD EU</div>
  <h1>QUALITY<br><span class="acc">CHRONICLE</span></h1>

<footer>
  <span>Quality Chronicle &mdash; <b>Brutalist Edition</b></span>

</footer>
</div>
<script>

  var cls='edition-card';
  if(e.type==='feature') cls+=' is-feature';
  if(e.type==='editorial-special') cls+=' is-special';
  var slug=e.file.replace('.json','');
  tl.innerHTML+='<a class="'+cls+'" href="viewer-brutalist.html?e='+slug+'">'+
