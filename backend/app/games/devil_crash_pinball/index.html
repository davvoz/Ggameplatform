<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#06030f">
    <title>Devil Crash Pinball</title>
    <link rel="stylesheet" href="../shared/fonts/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="/sdk/platformsdk.obf.js"></script>
</head>
<body>
    <div id="game-container">
        <button id="fullscreen-btn" title="Fullscreen" aria-label="Fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
        </button>
        <canvas id="game"></canvas>
        <div id="loading-screen" class="loading-overlay">
            <div class="loading-embers"></div>
            <div class="loading-content">
                <div class="loading-spinner">
                    <div class="spin-ring ring-1"></div>
                    <div class="spin-ring ring-2"></div>
                    <div class="spin-ring ring-3"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
